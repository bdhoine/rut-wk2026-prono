name: Update results

# Pulls WK 2026 results + top scorers from the free worldcup26.ir API and commits
# any changes, which triggers a Netlify rebuild. No API key/secret is required.
#
# Scheduled every 30 min, limited to the tournament window (11 Jun – 19 Jul).
# Cron has no year field, so this recurs each June/July; disable it after 2026.
# You can also run it manually (workflow_dispatch).

on:
  schedule:
    - cron: '*/30 * 11-30 6 *'  # 11–30 June
    - cron: '*/30 * 1-19 7 *'   # 1–19 July
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-results
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Update result data
        run: node scripts/update-results.mjs

      - name: Commit & push changes
        run: |
          if [ -n "$(git status --porcelain src/data)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add src/data
            git commit -m "Update WK 2026 results (automated)"
            git push
          else
            echo "No data changes."
          fi
